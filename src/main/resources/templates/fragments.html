<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title}">WM Tippspiel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<nav th:fragment="navbar" class="bg-slate-800 text-slate-100 p-4 border-b border-slate-700 shadow-lg">
  <div class="container mx-auto flex flex-wrap items-center justify-between gap-y-4">

    <a href="/" class="text-2xl font-black tracking-wider hover:scale-105 transition transform shrink-0">
      <span class="text-rose-500">WM</span> <span class="text-cyan-400">2026</span>
    </a>

    <div class="flex items-center space-x-3 font-bold shrink-0 order-2 md:order-3">

      <div sec:authorize="isAnonymous()" class="space-x-3">
        <a href="/login" class="text-slate-400 hover:text-cyan-400 transition">Login</a>
      </div>

      <div sec:authorize="isAuthenticated()" class="flex items-center space-x-3">
        <span class="text-slate-400 hidden sm:inline">
            Angemeldet als: <strong sec:authentication="name" class="text-cyan-400">Spieler</strong>
        </span>
        <form th:action="@{/logout}" method="post" class="m-0">
          <button type="submit" class="bg-rose-600 text-white px-3 py-2 rounded-lg hover:bg-rose-500 transition shadow-[0_0_10px_rgba(225,29,72,0.4)] text-sm sm:text-base">
            Logout
          </button>
        </form>
      </div>
    </div>

    <div sec:authorize="isAuthenticated()" class="w-full md:w-auto order-3 md:order-2 flex justify-center space-x-4 sm:space-x-6 font-bold text-slate-400 uppercase tracking-wide text-xs sm:text-sm">
      <a href="/" class="hover:text-cyan-400 transition">Startseite</a>
      <a href="/matches" class="hover:text-cyan-400 transition">Spielplan</a>
      <a href="/scoreboard" class="hover:text-cyan-400 transition">Rangliste</a>
    </div>

  </div>
</nav>

</html>
