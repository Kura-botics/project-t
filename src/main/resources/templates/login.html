<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login - Familien Tippspiel')}"></head>

<body class="bg-slate-900 text-slate-100 font-sans flex flex-col min-h-screen selection:bg-cyan-400 selection:text-slate-900">

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container mx-auto p-4 flex-grow flex items-center justify-center">

  <div class="w-full max-w-md bg-slate-800 rounded-xl shadow-2xl p-8 border border-slate-700 relative overflow-hidden">
    <div class="absolute left-0 top-0 bottom-0 w-2 bg-cyan-400 shadow-[0_0_15px_rgba(0,255,255,0.6)]"></div>

    <h2 class="text-3xl font-black text-slate-100 text-center mb-6 uppercase tracking-wider ml-2">Login</h2>

    <div th:if="${param.error}" class="bg-rose-500/20 border border-rose-500 text-rose-400 p-3 rounded-lg mb-6 font-bold text-center text-sm shadow-sm ml-2">
      Benutzername oder Passwort falsch.
    </div>

    <div th:if="${param.logout}" class="bg-emerald-500/20 border border-emerald-500 text-emerald-400 p-3 rounded-lg mb-6 font-bold text-center text-sm shadow-sm ml-2">
      Erfolgreich abgemeldet.
    </div>

    <form th:action="@{/login}" method="post" class="ml-2">
      <div class="mb-4">
        <label for="username" class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-wide">Benutzername</label>
        <input type="text" id="username" name="username" required
               class="w-full bg-slate-900 text-slate-100 border-2 border-slate-700 rounded-lg px-4 py-3 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 focus:outline-none transition font-bold">
      </div>

      <div class="mb-8">
        <label for="password" class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-wide">Passwort</label>
        <input type="password" id="password" name="password" required
               class="w-full bg-slate-900 text-slate-100 border-2 border-slate-700 rounded-lg px-4 py-3 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 focus:outline-none transition font-bold">
      </div>

      <div class="mb-8 flex items-center">
        <input type="checkbox" id="remember-me" name="remember-me"
               class="w-5 h-5 text-cyan-500 bg-slate-900 border-slate-700 rounded focus:ring-cyan-400 focus:ring-offset-slate-800 transition cursor-pointer">
        <label for="remember-me" class="ml-3 text-slate-400 text-xs font-bold uppercase tracking-wide cursor-pointer hover:text-slate-300 transition">
          Angemeldet bleiben
        </label>
      </div>

      <button type="submit" class="w-full bg-cyan-500 text-slate-900 font-black py-3 px-4 rounded-lg hover:bg-cyan-400 transition uppercase tracking-widest shadow-[0_0_10px_rgba(0,255,255,0.3)]">
        Anmelden
      </button>
    </form>

    <p class="mt-6 text-center text-slate-500 font-bold text-sm ml-2">
      Noch kein Konto? <a href="/register" class="text-cyan-400 hover:text-cyan-300 transition hover:underline">Jetzt registrieren</a>
    </p>
  </div>

</main>

</body>
</html>
