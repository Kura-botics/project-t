<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Registrierung - Familien Tippspiel')}"></head>

<body class="bg-slate-900 text-slate-100 font-sans flex flex-col min-h-screen selection:bg-purple-400 selection:text-slate-900">

<nav th:replace="~{fragments :: navbar}"></nav>

<main class="container mx-auto p-4 flex-grow flex items-center justify-center">

  <div class="w-full max-w-lg bg-slate-800 rounded-xl shadow-2xl p-8 border border-slate-700 relative overflow-hidden mt-6 mb-6">

    <div class="absolute left-0 top-0 bottom-0 w-2 bg-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.6)]"></div>

    <h2 class="text-3xl font-black text-slate-100 text-center mb-2 uppercase tracking-wider ml-2">Registrierung</h2>
    <p class="text-slate-400 text-center font-bold mb-6 ml-2">Erstelle deinen Account fürs Familientippspiel</p>

    <div th:if="${param.success}" class="bg-emerald-500/20 border border-emerald-500 text-emerald-400 p-4 rounded-lg mb-6 font-bold text-center shadow-sm ml-2">
      Erfolgreich registriert! <br>
      <a href="/login" class="text-white underline mt-2 inline-block">Jetzt anmelden</a>
    </div>

    <div th:if="${param.error}" class="bg-rose-500/20 border border-rose-500 text-rose-400 p-4 rounded-lg mb-6 font-bold text-center shadow-sm ml-2">
      Der Benutzername ist leider schon vergeben!
    </div>

    <form th:action="@{/register}" method="post" class="ml-2">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label for="firstname" class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-wide">Vorname</label>
          <input type="text" id="firstname" name="firstname" required
                 class="w-full bg-slate-900 text-slate-100 border-2 border-slate-700 rounded-lg px-4 py-3 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 focus:outline-none transition font-bold">
        </div>
        <div>
          <label for="lastname" class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-wide">Nachname</label>
          <input type="text" id="lastname" name="lastname" required
                 class="w-full bg-slate-900 text-slate-100 border-2 border-slate-700 rounded-lg px-4 py-3 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 focus:outline-none transition font-bold">
        </div>
      </div>

      <div class="mb-4">
        <label for="username" class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-wide">Benutzername</label>
        <input type="text" id="username" name="username" required
               class="w-full bg-slate-900 text-slate-100 border-2 border-slate-700 rounded-lg px-4 py-3 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 focus:outline-none transition font-bold">
      </div>

      <div class="mb-8">
        <label for="password" class="block text-slate-400 text-xs font-bold mb-2 uppercase tracking-wide">Passwort</label>
        <input type="password" id="password" name="password" required
               class="w-full bg-slate-900 text-slate-100 border-2 border-slate-700 rounded-lg px-4 py-3 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 focus:outline-none transition font-bold">
      </div>

      <button type="submit" class="w-full bg-purple-500 text-white font-black py-3 px-4 rounded-lg hover:bg-purple-400 transition uppercase tracking-widest shadow-[0_0_10px_rgba(168,85,247,0.4)]">
        Konto erstellen
      </button>
    </form>

    <p class="mt-6 text-center text-slate-500 font-bold text-sm ml-2">
      Schon registriert? <a href="/login" class="text-purple-400 hover:text-purple-300 transition hover:underline">Zum Login</a>
    </p>
  </div>

</main>

</body>
</html>
